name: Sync astro-demo-internal → astro-demo-example

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'astro-demo-internal/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to koryla-astro-demo-example
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r astro-demo-internal /tmp/astro-demo-target

          cd /tmp/astro-demo-target
          git init
          git checkout -b main
          git remote add origin https://andresclua:${GH_PAT}@github.com/andresclua/koryla-astro-demo-example.git
          git add -A
          git commit -m "sync: $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push origin main --force
